apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.app.name }}-deployment"
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      components: {{ .Values.app.components }}
  template:
    metadata:
      labels:
        components: {{ .Values.app.components }}
    spec:
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ .Values.app.image.name }}:{{ .Values.app.image.tag }}"
          ports:
            - containerPort: {{ .Values.app.port }}
          env:
            - name: VITE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.app.name }}-config"
                  key: VITE_DOMAIN
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
