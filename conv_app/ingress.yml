apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  annotations:
    nginx.ingress.kubernetes.io/add-base-url: "true"
spec:
  rules:
    - host: conv.test
      http:
        paths:
          - pathType: Prefix
            path: "/api"
            backend:
              service:
                name: conv-api-clusterip
                port:
                  number: 3000
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: conv-app-clusterip
                port:
                  number: 80
                  