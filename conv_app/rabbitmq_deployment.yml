apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      components: rabbitmq
  template:
    metadata:
      labels:
        components: rabbitmq
    spec:
      containers:
        - name: conv-app-rabbitmq
          image: rabbitmq:4.2.4
          ports:
            - containerPort: 15672
            - containerPort: 5672
          env:
            - name: SEED_USERNAME
              value: rabbit_user
            - name: SEED_USER_PASSWORD
              value: rabbit_user_password
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc